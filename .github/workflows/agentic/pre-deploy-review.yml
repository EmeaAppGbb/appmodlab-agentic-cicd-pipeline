name: Eyes Pre-Deploy Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  eyes-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              }
            );

            // Keep only added/modified text source files with their patches
            const sourceExts = /\.(js|jsx|ts|tsx|mjs|cjs)$/;
            const relevant = files
              .filter(f => ['added', 'modified'].includes(f.status) && sourceExts.test(f.filename))
              .map(f => ({ filename: f.filename, patch: f.patch || '' }));

            core.setOutput('files_json', JSON.stringify(relevant));
            core.info(`Found ${relevant.length} reviewable file(s) out of ${files.length} total`);

      - name: SQUAD Eyes Code Review
        id: eyes-review
        uses: actions/github-script@v7
        with:
          script: |
            const filesJson = ${{ steps.changed-files.outputs.files_json }};

            // --- Pattern definitions ---------------------------------------------------
            const patterns = [
              // Security — critical
              { re: /(?:api[_-]?key|secret|password|token|credential)\s*[:=]\s*['"][^'"]+['"]/gi, severity: 'critical', category: 'Security', message: 'Possible hardcoded secret or credential' },
              { re: /-----BEGIN\s+(RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----/g, severity: 'critical', category: 'Security', message: 'Private key detected' },
              { re: /AKIA[0-9A-Z]{16}/g, severity: 'critical', category: 'Security', message: 'AWS access key detected' },
              { re: /(\$\{[^}]+\}|['"] ?\+ ?\w+)/g, severity: 'warning', category: 'Security', message: 'Potential SQL injection — string interpolation in query context', guard: /(?:query|sql|execute|prepare)/i },
              { re: /\.innerHTML\s*=/g, severity: 'warning', category: 'Security', message: 'Direct innerHTML assignment — risk of XSS' },
              { re: /dangerouslySetInnerHTML/g, severity: 'warning', category: 'Security', message: 'dangerouslySetInnerHTML usage — ensure input is sanitized' },
              { re: /document\.write\s*\(/g, severity: 'warning', category: 'Security', message: 'document.write usage — risk of XSS' },
              { re: /eval\s*\(/g, severity: 'warning', category: 'Security', message: 'eval() usage — potential code injection' },

              // Performance — warning
              { re: /\bawait\b.+\b(query|find|fetch|get|select)\b/gi, severity: 'warning', category: 'Performance', message: 'Database/fetch call inside potential loop — check for N+1 queries', guard: /\b(for|while|forEach|\.map)\b/i, guardScope: 'context' },

              // Code quality — info
              { re: /\bconsole\.(log|debug|info)\s*\(/g, severity: 'info', category: 'Quality', message: 'console.log/debug statement left in code' },
              { re: /\b(TODO|FIXME|HACK|XXX)\b/g, severity: 'info', category: 'Quality', message: 'TODO/FIXME comment found' },
              { re: /\bdebugger\b/g, severity: 'warning', category: 'Quality', message: 'debugger statement left in code' },
            ];

            const findings = [];
            const MAX_FINDINGS = 50;

            for (const file of filesJson) {
              if (!file.patch) continue;

              // Parse added lines from the unified diff patch
              const patchLines = file.patch.split('\n');
              let currentLine = 0;

              for (const patchLine of patchLines) {
                // Track line numbers from @@ hunk headers
                const hunkMatch = patchLine.match(/^@@ -\d+(?:,\d+)? \+(\d+)/);
                if (hunkMatch) {
                  currentLine = parseInt(hunkMatch[1], 10);
                  continue;
                }

                // Only scan newly added lines (start with +, not +++)
                if (patchLine.startsWith('+') && !patchLine.startsWith('+++')) {
                  const line = patchLine.slice(1);

                  for (const pattern of patterns) {
                    if (findings.length >= MAX_FINDINGS) break;

                    // If pattern has a line-level guard, the line must also match the guard
                    if (pattern.guard && !pattern.guardScope) {
                      if (!pattern.guard.test(line)) continue;
                    }

                    // If pattern has a context-level guard, check surrounding patch for context
                    if (pattern.guard && pattern.guardScope === 'context') {
                      if (!pattern.guard.test(file.patch)) continue;
                    }

                    if (pattern.re.test(line)) {
                      findings.push({
                        file: file.filename,
                        line: currentLine,
                        severity: pattern.severity,
                        category: pattern.category,
                        message: pattern.message,
                      });
                    }
                    // Reset regex lastIndex for global patterns
                    pattern.re.lastIndex = 0;
                  }
                }

                // Advance line counter for added and context lines (not removed lines)
                if (!patchLine.startsWith('-')) {
                  currentLine++;
                }
              }
            }

            // --- Compute quality score --------------------------------------------------
            const critical = findings.filter(f => f.severity === 'critical').length;
            const warning = findings.filter(f => f.severity === 'warning').length;
            const info = findings.filter(f => f.severity === 'info').length;
            const qualityScore = Math.max(0, 100 - (critical * 15) - (warning * 5) - (info * 1));

            core.setOutput('quality_score', String(qualityScore));
            core.setOutput('total_findings', String(findings.length));
            core.setOutput('critical_count', String(critical));
            core.setOutput('warning_count', String(warning));
            core.setOutput('info_count', String(info));
            core.setOutput('findings_json', JSON.stringify(findings));

            core.info(`Quality score: ${qualityScore}/100 (${critical} critical, ${warning} warning, ${info} info)`);

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const score = parseInt('${{ steps.eyes-review.outputs.quality_score }}', 10);
            const critical = parseInt('${{ steps.eyes-review.outputs.critical_count }}', 10);
            const warning = parseInt('${{ steps.eyes-review.outputs.warning_count }}', 10);
            const info = parseInt('${{ steps.eyes-review.outputs.info_count }}', 10);
            const total = parseInt('${{ steps.eyes-review.outputs.total_findings }}', 10);
            const findings = JSON.parse(${{ steps.eyes-review.outputs.findings_json }});

            const passed = score >= 70;
            const icon = passed ? '✅' : '❌';
            const statusText = passed ? 'Passed' : 'Failed';

            const severityIcon = { critical: '🔴', warning: '🟡', info: '🔵' };

            let findingsTable = '';
            if (findings.length > 0) {
              const rows = findings.map(f =>
                `| ${severityIcon[f.severity]} ${f.severity} | ${f.category} | \`${f.file}\` | ${f.line} | ${f.message} |`
              );
              findingsTable = [
                '| Severity | Category | File | Line | Finding |',
                '|----------|----------|------|------|---------|',
                ...rows,
              ].join('\n');
            } else {
              findingsTable = '_No issues found — great job!_ 🎉';
            }

            let recommendation;
            if (critical > 0) {
              recommendation = '🚫 **Critical issues must be resolved before merging.**';
            } else if (warning > 0) {
              recommendation = '⚠️ Warnings should be reviewed — resolve before merging if possible.';
            } else {
              recommendation = '🎉 Looks good — no significant issues detected.';
            }

            const body = [
              '## 👁️ Eyes Pre-Deploy Review',
              '',
              `${icon} **Quality Score: ${score}/100** — ${statusText}`,
              '',
              '### Summary',
              '',
              '| Critical | Warnings | Info | Total |',
              '|----------|----------|------|-------|',
              `| ${critical} | ${warning} | ${info} | ${total} |`,
              '',
              '### Findings',
              '',
              findingsTable,
              '',
              '### Recommendation',
              '',
              recommendation,
              '',
              '---',
              '<sub>🤖 Automated review by SQUAD Eyes · updated on each push</sub>',
              '<!-- eyes-review-marker -->',
            ].join('\n');

            // Upsert: find existing bot comment and update, or create new
            const marker = '<!-- eyes-review-marker -->';
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              }
            );
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing review comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new review comment');
            }

      - name: Quality Gate
        if: ${{ fromJSON(steps.eyes-review.outputs.quality_score) < 70 }}
        run: |
          echo "::error::Eyes review failed with quality score ${{ steps.eyes-review.outputs.quality_score }}/100 (threshold: 70)"
          echo "Critical: ${{ steps.eyes-review.outputs.critical_count }}, Warnings: ${{ steps.eyes-review.outputs.warning_count }}, Info: ${{ steps.eyes-review.outputs.info_count }}"
          exit 1
