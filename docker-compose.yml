version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: metricflow
      POSTGRES_USER: metricflow
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://metricflow:devpassword@postgres:5432/metricflow
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
